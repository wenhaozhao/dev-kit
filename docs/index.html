    <h1>DevKit</h1>
    <p>Developer utilities for JSON/JSONL, text Diff, URI, time, Base64, and QR code.</p>
    <h2>Install</h2>
    <pre><code>brew tap wenhaozhao/dev-kit
brew install devkit
devkit --version</code></pre>
    <p>Or build from source with <code>cargo install --path ./dk</code>.</p>
